# Local overlay: rebinds custom keys from tmux.conf with -N notes so they
# show up in `prefix + ?` (which calls `list-keys -N`, filtering noteless
# bindings). Kept separate so upstream merges of tmux.conf stay clean.
#
# IMPORTANT: each `bind -N` here re-defines the binding. Keep the command
# part in sync with tmux.conf, otherwise this file silently overrides it.

# --- splits (mirrors tmux.conf:84-87) ---
bind -N "split pane horizontally (cwd of current pane)" \
  '\' split-window -h -c '#{pane_current_path}'
bind -N "split pane horizontally, full width" \
  '|' split-window -fh -c '#{pane_current_path}'
bind -N "split pane vertically (cwd of current pane)" \
  '-' split-window -v -c '#{pane_current_path}'
bind -N "split pane vertically, full width" \
  '_' split-window -fv -c '#{pane_current_path}'

# --- config reload (mirrors tmux.conf:90) ---
bind -N "reload tmux.conf" \
  r source-file ~/.config/tmux/tmux.conf \; \
    display-message "~/.config/tmux/tmux.conf reloaded"

# --- session cwd: the one this conversation started on (mirrors tmux.conf:193) ---
bind -N "set session start-directory to current pane cwd" \
  a attach-session -t . -c '#{pane_current_path}' \; \
    display 'working directory: #{pane_current_path}'

# --- popup htop (mirrors tmux.conf:198) ---
bind -N "htop in popup" \
  h display-popup -E -w 85% -h 85% "TERM=xterm htop -d 5"

